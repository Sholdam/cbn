name: Temporary Help BMG Whisper model chunks

on:
  pull_request:
    branches:
      - main

jobs:
  package-whisper-model:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download and split official Whisper multilingual model
        shell: bash
        run: |
          set -euo pipefail
          url='https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin'
          curl -L --fail --retry 3 "$url" -o ggml-base-q5_1.bin
          sha256sum ggml-base-q5_1.bin > SHA256SUMS.txt
          mkdir chunks
          split -b 6M -d -a 2 ggml-base-q5_1.bin chunks/whisper-part-
          cp SHA256SUMS.txt chunks/
          ls -lh chunks
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-00, path: chunks/whisper-part-00, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-01, path: chunks/whisper-part-01, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-02, path: chunks/whisper-part-02, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-03, path: chunks/whisper-part-03, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-04, path: chunks/whisper-part-04, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-05, path: chunks/whisper-part-05, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-06, path: chunks/whisper-part-06, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-07, path: chunks/whisper-part-07, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-08, path: chunks/whisper-part-08, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-part-09, path: chunks/whisper-part-09, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: whisper-sha256, path: chunks/SHA256SUMS.txt, retention-days: 1}
