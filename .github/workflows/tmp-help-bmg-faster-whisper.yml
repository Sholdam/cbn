      - uses: actions/upload-artifact@v4
        with: {name: fw-part-11, path: chunks/fw-part-11, retention-days: 1, compression-level: 0, if-no-files-found: error}
      - uses: actions/upload-artifact@v4
        with: {name: fw-part-12, path: chunks/fw-part-12, retention-days: 1, compression-level: 0, if-no-files-found: ignore}
      - uses: actions/upload-artifact@v4
